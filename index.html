<!DOCTYPE html>
<html>
<head>
    <title>Bike Accident Prediction</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            margin: auto;
            box-shadow: 0px 0px 15px black;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 8px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #00c6ff;
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            color: yellow;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Bike Accident Prediction</h2>

    <form action="/predict" method="post">
        <input type="number" name="Speed" placeholder="Enter Speed" required>
        <input type="number" name="Weather" placeholder="Weather (1-Clear, 2-Rainy)" required>
        <input type="number" name="Road" placeholder="Road (1-Good, 2-Bad)" required>
        <input type="number" name="Helmet" placeholder="Helmet (1-Yes, 0-No)" required>
        <input type="number" name="Alcohol" placeholder="Alcohol (1-Yes, 0-No)" required>

        <button type="submit">Predict</button>
    </form>

    <div class="result">
        {{ prediction_text }}
    </div>

</div>

</body>
</html>
